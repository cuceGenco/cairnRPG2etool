<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cairn DM Screen</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="topBar">
    <strong>Cairn DM Screen</strong>
    <div id="topActions">
      <a href="generators.html" target="_blank" style="color:#f8f6f0; margin-right: 12px;">Generators</a>
      <a href="reference.html" target="_blank" style="color:#f8f6f0; margin-right: 12px;">Reference</a>
      <span style="color:#aab9ca">(opens new tab; DM window auto-sync via postMessage)</span>
    </div>
    <div id="toolButtons" style="display:flex;gap:6px; align-items:center;">
      <button class="btn small-btn" id="exportAllBtn">Export JSON</button>
      <input type="file" id="importFile" style="display:none;" accept="application/json" />
      <button class="btn small-btn" id="importAllBtn">Import JSON</button>
    </div>
  </header>
  <main class="grid-container">
    <div class="grid-cell" id="cell1"><button class="add-btn">+</button></div>
    <div class="grid-cell" id="cell2"><button class="add-btn">+</button></div>
    <div class="grid-cell" id="cell3"><button class="add-btn">+</button></div>
    <div class="grid-cell" id="cell4"><button class="add-btn">+</button></div>
    <div class="grid-cell" id="cell5"><button class="add-btn">+</button></div>
    <div class="grid-cell" id="cell6"><button class="add-btn">+</button></div>
    <div class="grid-cell" id="cell7"><button class="add-btn">+</button></div>
    <div class="grid-cell" id="cell8"><button class="add-btn">+</button></div>
  </main>
  <script src="dm.js"></script>
</body>
</html>
